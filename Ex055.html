<!DOCTYPE html>
<html>
<head>
    <style>
        a:hover { color: red; }
        input:focus { border: 2px solid blue; background-color: #f0f8ff; }
        tr:nth-child(odd) { background-color: #e2e2e2; }
        p:not(.special) { color: gray; }
        input[type="checkbox"]:checked { outline: 2px solid green; }
        button:active { transform: scale(0.9); }
        input:required { border-right: 5px solid red; }
    </style>
</head>
<body>
    <a href="#">Link</a><br>
    <input type="text" placeholder="Focus here" required><br>
    <button>Press me</button>
    <p>Normal Text</p>
    <p class="special">Special Text</p>
    <table>
        <tr><td>Row 1</td></tr>
        <tr><td>Row 2</td></tr>
        <tr><td>Row 3</td></tr>
    </table>
</body>
</html>
