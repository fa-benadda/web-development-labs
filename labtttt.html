<!DOCTYPE html> 
<head> 
    <title>Lab 04 Exercise 2</title> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet"> 
</head> 
<body> 
    <div class="container mt-5"> 
        <h2 class="text-center mb-4">Lab 04 Exercise 2: Simple Calculator</h2> 
        <div class="row justify-content-center"> 
            <div class="col-md-6"> 
                <form id="calculatorForm"> 
                    <div class="mb-3"> 
                        <input type="number" class="form-control" id="num1" placeholder="Number 1" required> 
                    </div> 
                    <div class="mb-3"> 
                        <input type="number" class="form-control" id="num2" placeholder="Number 2" required> 
                    </div> 
                    <div class="mb-3"> 
                        <label for="operation" class="form-label">Operation</label> 
                        <select class="form-select" id="operation" required> 
                            <option value="add">Addition (+)</option> 
                            <option value="sub">Subtraction (-)</option> 
                            <option value="mult">Multiplication (*)</option> 
                            <option value="div">Division (/)</option> 
                        </select> 
                    </div> 
                    <button type="submit" class="btn btn-primary w-100">Calculate</button> 
                </form> 
                <div class="mt-3"> 
                    <h4>Result: <span id="result"></span></h4> 
                </div> 
            </div> 
        </div> 
    </div> 
    <script src="Script.js"></script> 
</body> 
</html>
