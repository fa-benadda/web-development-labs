<!DOCTYPE html>
<html>
<body>
    <h2>Temperature Converter</h2>
    <label>Celsius:</label>
    <input type="number" id="celsius" oninput="convert()">
    <h3>Fahrenheit: <span id="res">32</span> °F</h3>
    <script>
        function convert() {
            let c = document.getElementById("celsius").value;
            
            if (c === "") {
                document.getElementById("res").innerText = "32";
                return;
            }
            let f = (c * 9/5) + 32;
            document.getElementById("res").innerText = f.toFixed(2);
        }
    </script>
</body>
</html>
